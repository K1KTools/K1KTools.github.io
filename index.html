<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K1KTools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-y: scroll;
        }
        
        body[data-lang="en"] .lang-es { display: none !important; }
        body[data-lang="es"] .lang-en { display: none !important; }

        nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 1.5rem 2rem;
            gap: 1rem;
            position: absolute;
            top: 0; right: 0; left: 0;
            z-index: 100;
        }
        .lang-switch {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem;
            border-radius: 8px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(5px);
        }
        .lang-switch option { background: var(--bg-color); }
        .btn-donar {
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            transition: background-color 0.2s ease;
        }
        .btn-donar:hover { background-color: var(--accent-hover); }
        
        .hero {
            text-align: center;
            padding: 8rem 1rem 4rem 1rem;
            background: linear-gradient(to bottom, rgba(15,23,42,0) 0%, rgba(15,23,42,1) 100%), var(--card-bg);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .hero h1 {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
        }
        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
        }
        main { padding: 4rem 2rem; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
        
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            position: relative;
        }
        
        .card::after {
            content: "";
            position: absolute;
            top: -15px; left: -15px; right: -15px; bottom: -15px;
            z-index: 1; 
        }
        
        .card:hover {
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .card-img {
            width: 100%;
            height: 160px;
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px 12px 0 0;
            position: relative;
            z-index: 2;
        }
        .card-info { 
            padding: 1.5rem; 
            display: flex; 
            flex-direction: column; 
            gap: 0.8rem; 
            flex-grow: 1; 
            position: relative;
            z-index: 2;
        }
        .card-title { font-size: 1.3rem; font-weight: 700; }
        .card-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; }
        
        .desc-text {
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin: 0;
            transition: color 0.3s ease;
        }
        .card:hover .desc-text {
            -webkit-line-clamp: unset;
            color: #e2e8f0;
        }
        
        #loader { text-align: center; color: var(--text-muted); padding: 2rem; line-height: 1.6; }
        #loader a { color: var(--accent); text-decoration: none; font-weight: bold; }
        #loader a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav>
        <select id="lang-switch" class="lang-switch">
            <option value="es">ESPAÑOL</option>
            <option value="en">ENGLISH</option>
        </select>
        <a href="https://ko-fi.com/k1000k" target="_blank" class="btn-donar" id="btn-donar">DONAR</a>
    </nav>
    
    <header class="hero">
        <h1>K1K Tools</h1>
        <p class="hero-sub lang-es">¡Herramientas y utilidades gratis para todos!</p>
        <p class="hero-sub lang-en">Free tools and utilities for everyone!</p>
    </header>

    <main>
        <div id="loader">
            <span class="lang-es">Cargando herramientas...</span>
            <span class="lang-en">Loading tools...</span>
        </div>
        <div class="grid" id="cards-container">
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const userLang = navigator.language || navigator.userLanguage;
            let currentLang = userLang.toLowerCase().startsWith('es') ? 'es' : 'en';
            
            const updateLanguage = (lang) => {
                document.body.setAttribute('data-lang', lang);
                document.getElementById('btn-donar').textContent = lang === 'es' ? 'DONAR' : 'DONATE';
            };

            updateLanguage(currentLang);
            
            const langSelect = document.getElementById('lang-switch');
            langSelect.value = currentLang;
            langSelect.addEventListener('change', (e) => {
                updateLanguage(e.target.value);
            });

            const fetchTxt = async (url) => {
                try {
                    let resp = await fetch(url);
                    if (resp.ok) return (await resp.text()).trim();
                } catch (e) {}
                return "";
            };

            const container = document.getElementById('cards-container');
            const loader = document.getElementById('loader');

            try {
                let resCarpetas = await fetch('carpetas.txt');
                if (!resCarpetas.ok) throw new Error("Falta carpetas.txt");
                let carpetasText = await resCarpetas.text();
                
                let carpetas = carpetasText.split(/\r?\n/).map(c => c.trim()).filter(c => c !== "");
                loader.style.display = 'none';

                for (let carpeta of carpetas) {
                    let [link, n_base, n_es, n_en, d_base, d_es, d_en] = await Promise.all([
                        fetchTxt(`${carpeta}/link.txt`),
                        fetchTxt(`${carpeta}/nombre.txt`),
                        fetchTxt(`${carpeta}/nombre_es.txt`),
                        fetchTxt(`${carpeta}/nombre_en.txt`),
                        fetchTxt(`${carpeta}/descripcion.txt`),
                        fetchTxt(`${carpeta}/descripcion_es.txt`),
                        fetchTxt(`${carpeta}/descripcion_en.txt`)
                    ]);

                    let urlFinal = link ? link : "#";
                    if (urlFinal !== "#" && !urlFinal.startsWith('http')) urlFinal = "https://" + urlFinal;

                    let nameEs = n_es ? n_es : (n_base ? n_base : carpeta);
                    let nameEn = n_en ? n_en : (n_base ? n_base : carpeta);
                    let titleHtml = (nameEs === nameEn) 
                        ? `<h2 class="card-title">${nameEs}</h2>` 
                        : `<h2 class="card-title lang-es">${nameEs}</h2><h2 class="card-title lang-en">${nameEn}</h2>`;

                    let descEs = d_es ? d_es : d_base;
                    let descEn = d_en ? d_en : d_base;
                    if (descEs && !descEn) descEn = descEs;
                    if (descEn && !descEs) descEs = descEn;
                    
                    let descHtml = "";
                    if (descEs || descEn) {
                        if (descEs === descEn) {
                            descHtml = `<div class="card-desc"><p class="desc-text">${descEs}</p></div>`;
                        } else {
                            descHtml = `<div class="card-desc"><p class="desc-text lang-es">${descEs}</p><p class="desc-text lang-en">${descEn}</p></div>`;
                        }
                    }

                    let imgHtml = `
                        <div class="card-img lang-es" style="background-image: url('${carpeta}/imagen_es.png'), url('${carpeta}/imagen.png');"></div>
                        <div class="card-img lang-en" style="background-image: url('${carpeta}/imagen_en.png'), url('${carpeta}/imagen.png');"></div>
                    `;

                    let card = document.createElement('a');
                    card.href = urlFinal;
                    card.target = "_blank";
                    card.className = "card";
                    if (urlFinal === "#") {
                        card.onclick = (e) => { e.preventDefault(); alert(`Falta link.txt en la carpeta ${carpeta}`); };
                    }
                    
                    card.innerHTML = `
                        ${imgHtml}
                        <div class="card-info">
                            ${titleHtml}
                            ${descHtml}
                        </div>
                    `;
                    
                    container.appendChild(card);
                }
            } catch (err) {
                loader.innerHTML = `
                    <div class="lang-es">
                        No se pudieron cargar las herramientas. Por favor, intentá de nuevo más tarde.<br>
                        Si el problema persiste, contactame a <a href="mailto:k1000tools@gmail.com">k1000tools@gmail.com</a>.
                    </div>
                    <div class="lang-en">
                        Could not load the tools. Please try again later.<br>
                        If the problem persists, contact me at <a href="mailto:k1000tools@gmail.com">k1000tools@gmail.com</a>.
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
